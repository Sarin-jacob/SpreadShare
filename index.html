<!DOCTYPE html>
<html lang="en" class="dark" data-accent="indigo">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SpreadShare Studio</title>
  <link rel="stylesheet" href="/src/css/style.css">
</head>
<body class="bg-slate-50 text-slate-800 dark:bg-slate-900 dark:text-slate-100 min-h-screen transition-colors duration-200 antialiased font-sans pb-24 md:pb-0">

  <div class="md:flex md:min-h-screen max-w-7xl mx-auto">
    <!-- SIDEBAR DECK -->
    <aside class="hidden md:flex md:w-64 bg-slate-100 dark:bg-slate-950 border-r border-slate-200 dark:border-slate-800 flex-col justify-between p-6">
      <div class="space-y-6">
        <div>
          <h1 class="text-2xl font-black bg-gradient-to-r from-accent-600 to-accent-400 bg-clip-text text-transparent">SpreadShare</h1>
          <p class="text-[9px] text-slate-400 font-bold uppercase tracking-widest mt-0.5">Serverless Engine</p>
        </div>
        <nav class="space-y-1">
          <button data-route="dashboard" class="w-full flex items-center space-x-3 px-3 py-2.5 rounded-xl text-slate-500 dark:text-slate-400 font-semibold text-sm text-left hover:bg-slate-200/40 cursor-pointer">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 6a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2H6a2 2 0 01-2-2v-4zM14 16a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2h-2a2 2 0 01-2-2v-4z"/></svg>
            <span>Groups Directory</span>
          </button>
          <button data-route="insights" class="w-full flex items-center space-x-3 px-3 py-2.5 rounded-xl text-slate-500 dark:text-slate-400 font-semibold text-sm text-left hover:bg-slate-200/40 cursor-pointer">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" /></svg>
            <span>Global Insights</span>
          </button>
          <button data-route="settings" class="w-full flex items-center space-x-3 px-3 py-2.5 rounded-xl text-slate-500 dark:text-slate-400 font-semibold text-sm text-left hover:bg-slate-200/40 cursor-pointer">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
            <span>Settings Console</span>
          </button>
        </nav>
      </div>
    </aside>

    <div class="flex-grow flex flex-col justify-between min-h-screen md:min-h-0">
      <!-- SYSTEM HEADER -->
      <header class="w-full flex justify-between items-center px-4 py-4 border-b border-slate-200 dark:border-slate-800 bg-white/80 dark:bg-slate-900/80 backdrop-blur sticky top-0 z-40">
        <div class="md:hidden"><h2 class="text-lg font-black bg-gradient-to-r from-accent-600 to-accent-400 bg-clip-text text-transparent">SpreadShare</h2></div>
        <div class="hidden md:block text-xs font-bold text-slate-400 uppercase tracking-wider">Active Workspace Console</div>
        <div id="sync-indicator" class="flex items-center space-x-1.5 bg-slate-100 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 px-2.5 py-1 rounded-full text-[10px] font-bold">
          <span class="w-2 h-2 rounded-full bg-emerald-500"></span>
          <span class="text-slate-500 dark:text-slate-400 font-medium">Cloud Mirror Live</span>
        </div>
      </header>

      <!-- VIEWPORTS CONTAINER -->
      <div id="viewport-stage" class="p-4 flex-grow max-w-xl w-full mx-auto space-y-4">
        
        <!-- OAUTH ENTRY HANDSHAKE VIEW -->
        <div id="auth-gate" class="flex flex-col items-center justify-center text-center py-20">
          <div class="p-8 bg-slate-100 dark:bg-slate-800 border border-slate-200 dark:border-slate-800 rounded-2xl shadow-xl w-full max-w-sm space-y-6">
            <div class="h-12 w-12 bg-accent-500/10 text-accent-500 rounded-xl flex items-center justify-center mx-auto">
              <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>
            </div>
            <div class="space-y-2">
              <h2 class="text-base font-bold">Workspace Initialization</h2>
              <p class="text-xs text-slate-500 dark:text-slate-400">Secure open-ledger processing run on private user nodes.</p>
            </div>
            <button id="auth-btn" class="w-full bg-accent-600 hover:bg-accent-700 dark:bg-accent-500 text-white dark:text-slate-950 font-bold py-3 px-4 rounded-xl text-xs transition-transform active:scale-98">
              Connect Google Workspace Node
            </button>
          </div>
        </div>

        <!-- ACTIVE SYSTEM WRAPPER -->
        <div id="main-stage" class="hidden space-y-4">
          <section id="view-dashboard" class="space-y-4"></section>
          <section id="view-insights" class="hidden space-y-4"></section> <!-- ADD THIS LINE -->
          <section id="view-group-detail" class="hidden space-y-4"></section>
          <section id="view-add-expense" class="hidden space-y-4"></section>
          <section id="view-expense-detail" class="hidden space-y-4"></section>
          <section id="view-settings" class="hidden space-y-4"></section>
        </div>
      </div>

      <!-- MOBILE NAVIGATION BAR CONTAINER -->
      <footer class="md:hidden fixed bottom-0 left-0 right-0 border-t border-slate-200 dark:border-slate-800 bg-white/95 dark:bg-slate-900/95 backdrop-blur px-6 py-2 flex justify-around items-center z-40 shadow-xl">
        <button data-route="dashboard" class="flex flex-col items-center space-y-0.5 text-accent-500 dark:text-accent-400 cursor-pointer">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m0 0l-7 7-7-7M21 12v7a2 2 0 01-2 2h-3"/></svg>
          <span class="text-[9px] font-bold">Groups</span>
        </button>
        <button data-route="insights" class="flex flex-col items-center space-y-0.5 text-slate-400 cursor-pointer">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M16 8v8m-4-5v5m-4-2v2m-2 4h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
          <span class="text-[9px] font-medium">Insights</span>
        </button>
        <button data-route="settings" class="flex flex-col items-center space-y-0.5 text-slate-400 cursor-pointer">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4"/></svg>
          <span class="text-[9px] font-medium">Settings</span>
        </button>
      </footer>

    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
